<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History Query Skill</title>
  </head>
  <body>
    <script>
      function callNative(apiName, payload) {
        if (!window.MindFlowNativeBridge || typeof window.MindFlowNativeBridge.invoke !== "function") {
          throw new Error("MindFlowNativeBridge is unavailable");
        }
        const raw = window.MindFlowNativeBridge.invoke(apiName, JSON.stringify(payload || {}));
        return JSON.parse(raw || "{}");
      }

      function normalizeQueryPayload(input) {
        return {
          timeScope: input.timeScope || { type: "all_time" },
          entityTerms: Array.isArray(input.entityTerms) ? input.entityTerms : [],
          noteIds: Array.isArray(input.noteIds) ? input.noteIds : [],
          pageSize: typeof input.pageSize === "number" ? input.pageSize : 20,
          cursor: typeof input.cursor === "string" ? input.cursor : null,
          includeContent: Boolean(input.includeContent),
          sort: input.sort || "created_at_asc"
        };
      }

      function formatCoverage(coverage) {
        if (!coverage) return "没有可用的历史记录统计。";
        const matched = Number(coverage.matchedCount || 0);
        const processed = Number(coverage.processedCount || 0);
        const start = coverage.dateRange && coverage.dateRange.start;
        const end = coverage.dateRange && coverage.dateRange.end;
        const range = start && end ? `，时间范围 ${start} 到 ${end}` : "";
        return `命中 ${matched} 条记录，已处理 ${processed} 条${range}。`;
      }

      function formatRecordLine(record) {
        const date = record.date || "未知日期";
        const title = record.title || "未命名记录";
        const summary = record.summary || "";
        return `- ${date}《${title}》：${summary}`;
      }

      function encodePayload(payload) {
        const json = JSON.stringify(payload || {});
        const bytes = window.TextEncoder
          ? new TextEncoder().encode(json)
          : Uint8Array.from(unescape(encodeURIComponent(json)), (char) => char.charCodeAt(0));
        let binary = "";
        bytes.forEach((byte) => {
          binary += String.fromCharCode(byte);
        });
        return btoa(binary)
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/g, "");
      }

      function compactText(value, maxLength) {
        const text = String(value || "").replace(/\s+/g, " ").trim();
        return text.length > maxLength ? `${text.slice(0, maxLength - 1)}…` : text;
      }

      function formatScopeLabel(timeScope, coverage) {
        const scope = timeScope || {};
        if (scope.type === "day" && scope.date) return scope.date;
        if (scope.type === "month" && scope.month) return scope.month;
        if (scope.type === "range" && scope.start && scope.end) return `${scope.start} 至 ${scope.end}`;
        const range = coverage && coverage.dateRange ? coverage.dateRange : {};
        if (range.start && range.end) return `${range.start} 至 ${range.end}`;
        return "全部历史";
      }

      function normalizeRecordForCard(record) {
        return {
          id: record.id || "",
          date: record.date || "未知日期",
          title: compactText(record.title || "未命名记录", 34),
          summary: compactText(record.summary || "", 86),
          folder: record.folder || "",
          tags: Array.isArray(record.tags) ? record.tags.slice(0, 4) : []
        };
      }

      function buildInsightCardUrl(input, coverage, records) {
        const payload = {
          version: 1,
          cardType: String(input?.intent || "lookup"),
          query: compactText(input?.query || "", 80),
          generatedAt: new Date().toISOString(),
          scopeLabel: formatScopeLabel(input?.timeScope, coverage),
          coverage: coverage || null,
          records: records.slice(0, 12).map(normalizeRecordForCard)
        };
        const params = new URLSearchParams();
        params.set("payload", encodePayload(payload));
        return `assets/insight-card.html?${params.toString()}`;
      }

      function buildResultCardUrl(coverage, records) {
        const params = new URLSearchParams();
        const dateRange = coverage && coverage.dateRange ? coverage.dateRange : {};
        params.set("total", String(coverage?.totalCount || 0));
        params.set("matched", String(coverage?.matchedCount || 0));
        params.set("processed", String(coverage?.processedCount || 0));
        params.set("complete", String(Boolean(coverage?.complete)));
        params.set("generated", new Date().toISOString());
        if (dateRange.start) params.set("start", String(dateRange.start));
        if (dateRange.end) params.set("end", String(dateRange.end));
        const titles = records
          .slice(0, 4)
          .map((record) => `${record.date || "未知日期"}｜${record.title || "未命名记录"}`);
        if (titles.length > 0) params.set("records", titles.join("\n"));
        return `assets/result-card.html?${params.toString()}`;
      }

      async function runHistoryQuery(input) {
        const payload = normalizeQueryPayload(input || {});
        const intent = String(input?.intent || "lookup");
        const countResult = callNative("history.count", payload);
        const coverage = countResult.coverage || null;
        if (intent === "count") {
          return {
            result: formatCoverage(coverage),
            webview: {
              url: buildInsightCardUrl(input, coverage, []),
              iframe: false,
              aspectRatio: 0.78
            },
            metadata: {
              matchedCount: String(coverage?.matchedCount || 0),
              processedCount: String(coverage?.processedCount || 0),
              complete: String(Boolean(coverage?.complete))
            },
            data: {
              coverage,
              records: []
            }
          };
        }

        const queryResult = callNative("history.query", payload);
        const records = Array.isArray(queryResult.records) ? queryResult.records : [];
        const lines = [
          formatCoverage(queryResult.coverage),
          ...records.slice(0, 5).map(formatRecordLine)
        ];
        return {
          result: lines.join("\n"),
          webview: {
            url: buildInsightCardUrl(input, queryResult.coverage || coverage, records),
            iframe: false,
            aspectRatio: 0.78
          },
          metadata: {
            matchedCount: String(coverage?.matchedCount || 0),
            processedCount: String(coverage?.processedCount || 0),
            complete: String(Boolean(coverage?.complete))
          },
          data: {
            coverage,
            records
          }
        };
      }

      window["ai_edge_gallery_get_result"] = async (data) => {
        try {
          const input = JSON.parse(data || "{}");
          return JSON.stringify(await runHistoryQuery(input));
        } catch (error) {
          return JSON.stringify({ error: String(error?.message || error) });
        }
      };
    </script>
  </body>
</html>
